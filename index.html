<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment 2 - Blocky Goat</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --border: #bba98c;
      --text: #2f2417;
      --accent: #7d5a32;
      --canvas: #dbe7f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Trebuchet MS", sans-serif;
      background: linear-gradient(180deg, #f6f1ea 0%, #e6dccd 100%);
      color: var(--text);
    }

    .page {
      display: grid;
      grid-template-columns: minmax(360px, 760px) minmax(280px, 360px);
      gap: 20px;
      padding: 20px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(73, 53, 28, 0.12);
      padding: 16px;
    }

    h1, h2 {
      margin: 0 0 10px;
    }

    p {
      margin: 0 0 10px;
      line-height: 1.35;
    }

    canvas {
      width: 100%;
      max-width: 720px;
      height: auto;
      display: block;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--canvas);
    }

    .perf {
      margin-top: 10px;
      font-weight: 700;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .control {
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid #d9ccb8;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.65);
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .note {
      font-size: 13px;
      opacity: 0.85;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <h1>Blocky 3D Goat</h1>
      <p>Drag on the canvas to rotate. Shift-click the canvas to trigger the poke animation.</p>
      <canvas id="webgl" width="720" height="540"></canvas>
      <div class="perf" id="perf">FPS: --</div>
    </section>

    <aside class="panel">
      <h2>Controls</h2>
      <div class="buttons">
        <button id="animOnBtn">Animation On</button>
        <button id="animOffBtn">Animation Off</button>
        <button id="resetBtn">Reset Pose</button>
      </div>
      <div class="controls" id="controls"></div>
      <p class="note">This version includes a cube primitive, a cone primitive for the horns, mouse rotation, shift-click poke, animation toggle, and a live FPS indicator.</p>
    </aside>
  </div>

  <script src="./asg2.js"></script>
</body>
</html>
